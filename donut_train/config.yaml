# Token vocabulary
TASK_TOKEN:  "<s_donut>"

# Placeholder content for an absent field (token2json format only) — lets the
# model learn an explicit "missing" signal instead of an empty span.
MISSING_TOKEN: "<missing>"

# Legacy symmetric format: <field> value <field>
FIELD_TOKENS:
  - "<numero_da_nota>"
  - "<data_emissao>"
  - "<cpf_cnpj_prestador>"
  - "<cep_prestador>"
  - "<cpf_cnpj_tomador>"
  - "<servico_prestado>"
  - "<valor_da_nota>"
  - "<calculo_do_imposto>"
